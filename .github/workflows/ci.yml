name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore SaborMercado.sln

      - name: Build
        run: dotnet build SaborMercado.sln -c Release --no-restore

      - name: Test
        run: dotnet test SaborMercado.sln -c Release --no-build --verbosity normal
