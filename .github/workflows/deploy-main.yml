name: Deploy to VM

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Pack publish artifact
        run: bash scripts/pack-publish.sh

      - name: Copy to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          source: "sabormercado-publish.tar.gz,sabormercado-scripts.tar.gz"
          target: "/home/ubuntu/deploy/"

      - name: Deploy on VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            set -e
            cd /home/ubuntu/deploy
            tar -xzf sabormercado-scripts.tar.gz
            set -a
            source sabormercado.secrets
            set +a
            PUBLIC_BASE=https://rpjtechgroup.ddns.net/mercado bash scripts/deploy-sabormercado-vm.sh sabormercado-publish.tar.gz
