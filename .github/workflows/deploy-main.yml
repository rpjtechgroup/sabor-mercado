name: Deploy to VM

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore SaborMercado.sln

      - name: Build
        run: dotnet build SaborMercado.sln -c Release --no-restore

      - name: Test
        run: dotnet test SaborMercado.sln -c Release --no-build --verbosity normal

  deploy:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Pack publish artifact
        run: bash scripts/pack-publish.sh

      - name: Copy to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          source: "sabormercado-publish.tar.gz,sabormercado-scripts.tar.gz"
          target: "/home/ubuntu/deploy/"

      - name: Deploy on VM
        uses: appleboy/ssh-action@v1.0.3
        env:
          SABOR_DB_PASS: ${{ secrets.SABOR_DB_PASS }}
          SABOR_JWT_KEY: ${{ secrets.SABOR_JWT_KEY }}
          SABOR_SMTP_PASSWORD: ${{ secrets.SABOR_SMTP_PASSWORD }}
          SABOR_GOOGLE_CLIENT_ID: ${{ secrets.SABOR_GOOGLE_CLIENT_ID }}
          SABOR_SMTP_USER: ${{ secrets.SABOR_SMTP_USER }}
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          envs: SABOR_DB_PASS,SABOR_JWT_KEY,SABOR_SMTP_PASSWORD,SABOR_GOOGLE_CLIENT_ID,SABOR_SMTP_USER
          script: |
            set -e
            cd /home/ubuntu/deploy
            tar -xzf sabormercado-scripts.tar.gz
            umask 077
            cat > sabormercado.secrets <<EOF
            SABOR_DB_PASS=${SABOR_DB_PASS}
            SABOR_JWT_KEY=${SABOR_JWT_KEY}
            SABOR_SMTP_PASSWORD=${SABOR_SMTP_PASSWORD}
            SABOR_GOOGLE_CLIENT_ID=${SABOR_GOOGLE_CLIENT_ID}
            SABOR_SMTP_USER=${SABOR_SMTP_USER:-rpjtechgroup@gmail.com}
            EOF
            set -a
            source sabormercado.secrets
            set +a
            PUBLIC_BASE=https://rpjtechgroup.ddns.net/mercado bash scripts/deploy-sabormercado-vm.sh sabormercado-publish.tar.gz
