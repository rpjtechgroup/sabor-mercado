# rpjtechgroup.ddns.net — apenas /mercado e /imobiliaria; raiz retorna 404.

server {
    listen 80;
    listen [::]:80;
    server_name rpjtechgroup.ddns.net;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name rpjtechgroup.ddns.net;

    ssl_certificate /etc/letsencrypt/live/rpjtechgroup.ddns.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rpjtechgroup.ddns.net/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 4m;

    # Raiz e demais paths fora de /mercado e /imobiliaria → 404
    location = / {
        return 404;
    }

    location / {
        return 404;
    }

    # --- Sabor Mercado ---
    location = /mercado {
        return 301 /mercado/;
    }

    location /mercado/api/ {
        proxy_pass http://127.0.0.1:5280/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /mercado/ {
        alias /home/ubuntu/sabormercado/wwwroot/;
        try_files $uri $uri/ /mercado/index.html;
    }

    location = /mercado/index.html {
        alias /home/ubuntu/sabormercado/wwwroot/index.html;
    }

    # --- Imobiliária ---
    location = /imobiliaria {
        return 301 /imobiliaria/;
    }

    location /imobiliaria/api/ {
        proxy_pass http://127.0.0.1:5097/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /imobiliaria/uploads/ {
        proxy_pass http://127.0.0.1:5097/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /imobiliaria/ {
        alias /home/ubuntu/imobiliaria/wwwroot/;
        try_files $uri $uri/ /imobiliaria/index.html;
    }

    location = /imobiliaria/index.html {
        alias /home/ubuntu/imobiliaria/wwwroot/index.html;
    }
}
